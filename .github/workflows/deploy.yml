name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    environment: production #rr

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -x

            # Add pnpm global bin and PNPM_HOME to PATH
            export PATH="/home/deploy/.npm-global/bin:$PATH"
            export PNPM_HOME="$HOME/.local/share/pnpm"
            export PATH="$PNPM_HOME:$PATH"

            # Print versions to verify environment
            echo "Environment setup:"
            node -v
            pnpm -v
            pm2 -v

            cd /home/deploy/prepedge_be

            echo "Pulling latest code..."
            git pull origin main

            echo "Installing dependencies..."
            pnpm install --frozen-lockfile

            echo "Building application..."
            pnpm build

            echo "Restarting PM2..."
            pm2 restart prepedge-api || pm2 start ecosystem.config.js

            echo "Saving PM2 process list..."
            pm2 save
